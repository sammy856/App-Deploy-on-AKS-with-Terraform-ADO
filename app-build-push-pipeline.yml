# ============================================================
# Stage 4 - Build Image and Deploy to AKS
# ============================================================

trigger: none
pr: none

resources:
  pipelines:

    - pipeline: ansiblePipeline
      source: ansible-configuration-pipeline

      trigger: none
        # branches:
        #   include:
        #     - main

variables:

  service_connection: 'azserviecconnection'

  acrName: 'sameeracr'

  acrLoginServer: 'sameeracr.azurecr.io'

  imageRepository: 'microtodo-app'

  imageTag: '$(Build.BuildId)'





stages:
  - stage: AppBuildAndPush
    displayName: 'Build Image and Push  to ACR'
    dependsOn: TerraformApplyStage
    condition: and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )

    jobs:

# ============================================================
# Job 1 - Build and Push Docker Image
# ============================================================

      - job: BuildAndPushImage
        displayName: 'Build and Push Docker Image to ACR'

        steps:

          - task: AzureCLI@2
            displayName: 'Login to ACR'
            inputs:
              azureSubscription: '$(service_connection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(acrName)

          - task: Bash@3
            displayName: 'Build Docker Image'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                docker build \
                  -f $(System.DefaultWorkingDirectory)/MicroTodoUI/Dockerfile \
                  -t $(acrLoginServer)/$(imageRepository):$(imageTag) \
                  $(System.DefaultWorkingDirectory)/MicroTodoUI

          - task: Bash@3
            displayName: 'Push Docker Image to ACR'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                docker push \
                  $(acrLoginServer)/$(imageRepository):$(imageTag)


