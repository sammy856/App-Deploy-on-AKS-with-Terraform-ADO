apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-deployment
  namespace: dev
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: microtodo
  template:
    metadata: 
      labels:
        app: microtodo
    spec:
      containers:
      - name: microtodo
        image: acr.azurecr.io/microtodo-app:$(Build.BuildId)
