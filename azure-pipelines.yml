trigger: 
  branches:
    include:
      - main 


pr:
  branches:
    include:
      - main

variables:

  WORKING_DIR: '$(System.DefaultWorkingDirectory)/AKS/environments/dev' 
  TF_VERSION: '1.15.6' 
  resourceGroupName: 'donotdeletemygroup' 
  aksClusterName: 'sammyaks' 
  acrName: 'sameeracr' 
  acrLoginServer: 'sameeracr.azurecr.io' 
  imageRepository: 'microtodo-app' 
  imageTag: '$(Build.BuildId)' 
  kubernetesNamespace: 'dev'
  TF_PLAN_NAME: 'tfplan'
  service_connection: 'azserviecconnection'



stages:
  - stage: securityandcompliancecheck
    jobs:
      - job: SecurityScanJob
        displayName: Security Scan Job
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '$(TF_VERSION)'

          - task: Bash@3
            displayName: 'Install TFLint'
            inputs:
              targetType: 'inline'
              script: |
                curl -sSLO https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip
                unzip -o tflint_linux_amd64.zip
                sudo install -c -v tflint /usr/local/bin/ 

          - task: Bash@3
            displayName: 'Install Checkov'
            inputs:
              targetType: 'inline'
              script: |
                python3 -m pip install --upgrade pip
                pip3 install checkov
                
          - task: Bash@3
            displayName: 'Run TFLint Scan'
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                tflint --chdir=$(System.DefaultWorkingDirectory) --recursive       

          - task: Bash@3
            displayName: 'Run Checkov Scan'
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                checkov -d $(System.DefaultWorkingDirectory) \
                  --framework terraform \
                  -o junitxml > Checkov-Result.xml      

          - task: PublishTestResults@2
            displayName: 'Publish Checkov Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'Checkov-Result.xml'
              failTaskOnFailedTests: false

# ============================================================
# Stage 2 - Terraform Plan
# ============================================================

  - stage: TerraformInitializationandPlanningStage
    displayName: Terraform Initialization & Planning Stage
    jobs:
      - job:  TerraformInitializationandPlanningJob
        displayName: Terraform Initialization & Planning Job
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '$(TF_VERSION)'

              
          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(WORKING_DIR)
              backendServiceArm: '$(service_connection)'
              backendAzureRmOverrideSubscriptionID: '712eeec0-3f6b-4702-8f88-dbfca33db4d0'
              backendAzureRmResourceGroupName: 'donotdeletemygroup'
              backendAzureRmStorageAccountName: 'donotdeletemystorageyaar'
              backendAzureRmContainerName: 'mycontainer'
              backendAzureRmKey: 'dev.terraform.tfstate'

          - task: TerraformTask@5
            displayName: Terraform Validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: $(WORKING_DIR)

          - task: TerraformTask@5
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(WORKING_DIR)'
              environmentServiceNameAzureRM: '$(service_connection)'
              commandOptions: '-out=$(System.DefaultWorkingDirectory)/AKS/$(TF_PLAN_NAME)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan Artifact'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/AKS/$(TF_PLAN_NAME)'
              artifact: 'terraform-plan'
              publishLocation: 'pipeline'

# ============================================================
# Stage 3 - Terraform Apply
# ============================================================

  - stage: TerraformApplyStage
    displayName: 'Terraform Infrastructure Deployment'
    dependsOn: TerraformInitializationandPlanningStage
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:

    # ==========================================================
    # Manual Approval
    # ==========================================================
    - job: ManualApproval
      displayName: 'Infrastructure Change Approval'
      pool: server

      steps:
      - task: ManualValidation@0
        displayName: 'Review Terraform Plan'
        timeoutInMinutes: 1440
        inputs:
          notifyUsers: |
            benamikumar@gmail.com
          instructions: |
            Please review Terraform plan output and approve deployment.
          onTimeout: reject

    # ==========================================================
    # Terraform Apply
    # ==========================================================
    - job: TerraformApplyJob
      displayName: 'Apply Approved Infrastructure Changes'
      dependsOn: ManualApproval

      steps:

      - task: TerraformInstaller@1
        displayName: 'Install Terraform CLI'
        inputs:
          terraformVersion: $(TF_VERSION)

      - task: TerraformTask@5
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(WORKING_DIR)'
          backendServiceArm: '$(service_connection)'
          backendAzureRmOverrideSubscriptionID: '712eeec0-3f6b-4702-8f88-dbfca33db4d0'
          backendAzureRmResourceGroupName: 'donotdeletemygroup'
          backendAzureRmStorageAccountName: 'donotdeletemystorageyaar'
          backendAzureRmContainerName: 'mycontainer'
          backendAzureRmKey: 'dev.terraform.tfstate'

      - task: DownloadPipelineArtifact@2
        displayName: 'Download Terraform Plan Artifact'
        inputs:
          artifact: 'terraform-plan'
          path: '$(Pipeline.Workspace)/terraform-plan'

      - task: TerraformTask@5
        displayName: 'Apply Approved Terraform Plan'
        inputs:
          provider: 'azurerm'
          command: 'apply'
          workingDirectory: $(WORKING_DIR)
          environmentServiceNameAzureRM: '$(service_connection)'
          commandOptions: '$(Pipeline.Workspace)/terraform-plan/$(TF_PLAN_NAME)'


# ============================================================
# Stage 4 - Build Image and Deploy to AKS
# ============================================================

  - stage: AppBuildAndDeploy
    displayName: 'Build Image and Deploy to AKS'
    dependsOn: TerraformApplyStage
    condition: and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )

    jobs:

# ============================================================
# Job 1 - Build and Push Docker Image
# ============================================================

      - job: BuildAndPushImage
        displayName: 'Build and Push Docker Image to ACR'

        steps:

          - task: AzureCLI@2
            displayName: 'Login to ACR'
            inputs:
              azureSubscription: '$(service_connection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(acrName)

          - task: Bash@3
            displayName: 'Build Docker Image'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                docker build \
                  -f $(System.DefaultWorkingDirectory)/MicroTodoUI/Dockerfile \
                  -t $(acrLoginServer)/$(imageRepository):$(imageTag) \
                  $(System.DefaultWorkingDirectory)/MicroTodoUI

          - task: Bash@3
            displayName: 'Push Docker Image to ACR'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                docker push \
                  $(acrLoginServer)/$(imageRepository):$(imageTag)


# ============================================================
# Job 2 - Deploy Application to AKS
# ============================================================

      - job: DeployToAKS
        displayName: 'Deploy Application to AKS'
        dependsOn: BuildAndPushImage

        steps:

          - task: AzureCLI@2
            displayName: 'Connect to AKS'
            inputs:
              azureSubscription: '$(service_connection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e
                
                az aks get-credentials \
                  --resource-group $(resourceGroupName) \
                  --name $(aksClusterName) \
                  --overwrite-existing

          - task: Bash@3
            displayName: 'Check AKS DNS and Connection'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                echo "Kubeconfig server:"
                kubectl config view --minify \
                  -o jsonpath='{.clusters[0].cluster.server}'
                echo

                echo "AKS current FQDN from Azure:"
                az aks show \
                  --resource-group $(resourceGroupName) \
                  --name $(aksClusterName) \
                  --query fqdn \
                  -o tsv

                echo "DNS test:"
                nslookup $(az aks show \
                  --resource-group $(resourceGroupName) \
                  --name $(aksClusterName) \
                  --query fqdn \
                  -o tsv)

                echo "Cluster test:"
                kubectl get nodes        


          - task: Bash@3
            displayName: 'Deploy Kubernetes Manifests'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                # Create namespace
                kubectl apply \
                  -f $(System.DefaultWorkingDirectory)/kubernetes/namespace.yml

                # Replace image placeholder with current Build ID image
                sed -i \
                  "s|IMAGE_PLACEHOLDER|$(acrLoginServer)/$(imageRepository):$(imageTag)|g" \
                  $(System.DefaultWorkingDirectory)/kubernetes/deployment.yml

                # Deploy application
                kubectl apply \
                  -f $(System.DefaultWorkingDirectory)/kubernetes/deployment.yml

                kubectl apply \
                  -f $(System.DefaultWorkingDirectory)/kubernetes/service.yml


          - task: Bash@3
            displayName: 'Verify Kubernetes Deployment'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                kubectl rollout status \
                  deployment/dev-deployment \
                  --namespace $(kubernetesNamespace) \
                  --timeout=300s

                echo "=============================="
                echo "PODS"
                echo "=============================="

                kubectl get pods \
                  --namespace $(kubernetesNamespace) \
                  -o wide

                echo "=============================="
                echo "SERVICES"
                echo "=============================="

                kubectl get services \
                  --namespace $(kubernetesNamespace)